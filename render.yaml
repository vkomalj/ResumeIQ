services:
  - type: web
    name: resumeiq-backend
    runtime: python
    rootDir: ResumeIQ_BE
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: MAIL_FROM
        sync: false
      - key: MAIL_PASSWORD
        sync: false

databases:
  - name: resumeiq-db
    databaseName: resume_db
    user: resumeiq_user
    plan: free
